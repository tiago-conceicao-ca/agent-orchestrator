name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm

      # --- Install tmux ---
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      # --- Start tmux server ---
      - name: Start tmux server
        run: tmux start-server

      # --- Install agent binaries ---
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Codex
        run: npm install -g @openai/codex

      - name: Install Aider
        run: pip install aider-chat

      - name: Install OpenCode
        run: npm install -g opencode-ai

      # --- Build project ---
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@contaazul/cahi-web' build

      # --- Run integration tests ---
      - name: Run integration tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          # Note: COMPOSIO_API_KEY is intentionally not passed here.
          # When both keys are set, the plugin prefers the Composio transport
          # which requires @contaazul/cahi-core SDK installed. The direct LINEAR_API_KEY
          # transport needs no extra dependencies.
        run: pnpm test:integration
